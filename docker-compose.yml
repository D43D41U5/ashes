# Stack de développement : serveur Vite (client) + serveur autoritatif (server).
# Édite un fichier sous packages/client/src/ → recompilation à la volée + rechargement auto.
#
# LE REVERSE PROXY EST DÉSORMAIS PARTAGÉ ET EXTERNE — il vit dans ~/projects/proxy
# (Traefik commun à tous les sites). Cette stack ne publie plus le port 80 : elle
# rejoint le réseau `traefiknet` et sa route est déclarée dans proxy/dynamic/ashes.yml.
#
#   cd ~/projects/proxy && docker compose up -d   # une fois : démarre le proxy
#   docker compose up -d                          # ici : démarre client + server
#   → http://ashes.test  (dashboard Traefik : http://localhost:8080)
#
# Le proxy utilise le provider « fichier » (et non Docker) : évite le socket Docker et
# les soucis de négociation d'API avec Docker Engine 29+ (cf. convention du projet front).
#
# ─── AJOUTER UNE DÉPENDANCE npm (la seule manœuvre que le montage `:ro` complique) ───
#
# Les sources sont montées `:ro` (voir le service `client`) et les node_modules vivent
# dans des volumes nommés. Conséquence : le `pnpm install` du conteneur ne peut PAS
# écrire son fichier temporaire à la racine `/app` — il ne passe donc que quand il n'a
# RIEN à installer. Dès qu'un package.json gagne une dépendance, le conteneur tombe en
# BOUCLE DE CRASH sur « EROFS: read-only file system, open '/app/_tmp_…' » (vécu le
# 2026-07-18 en ajoutant colyseus.js pour le multi).
#
# La marche à suivre, après avoir édité un package.json et lancé `pnpm install` SUR
# L'HÔTE (qui met à jour pnpm-lock.yaml) — peupler les volumes du conteneur par un
# one-off EN ÉCRITURE, `--frozen-lockfile` pour ne PAS réécrire le lockfile :
#
#   docker compose stop client
#   docker run --rm \
#     -v "$(pwd)":/app \
#     -v ashes_braises_node_modules:/app/node_modules \
#     -v ashes_braises_client_modules:/app/packages/client/node_modules \
#     -v ashes_braises_sim_modules:/app/packages/sim/node_modules \
#     -v ashes_braises_server_modules:/app/packages/server/node_modules \
#     -v ashes_braises_pnpm_store:/pnpm-store \
#     -e NPM_CONFIG_STORE_DIR=/pnpm-store \
#     -w /app node:22-alpine \
#     sh -c "corepack enable && pnpm install --frozen-lockfile"
#   docker compose up -d client          # son install redevient un no-op → healthy
#
# Le one-off laisse un `.pnpm-store/` root à la racine (pnpm veut son store sur le
# disque du PROJET, qui est le bind `/app`, pas le volume). Il est GITIGNORÉ et l'hôte
# ne s'en sert pas (son store est global, ~/.local/share/pnpm) — à retirer d'un coup,
# car un dossier root dans le dépôt est exactement ce que le montage `:ro` combat :
#   docker run --rm -v "$(pwd)":/app node:22-alpine rm -rf /app/.pnpm-store
#
# NB — les noms de volumes sont préfixés du dossier projet (« ashes_… ») ; les vérifier
# par `docker volume ls` si le dépôt est cloné ailleurs.
# ────────────────────────────────────────────────────────────────────────────────────
services:
  # Serveur de dev Vite. Le code source est monté en volume : les changements
  # sur l'hôte sont vus dans le conteneur. node_modules dans des volumes nommés
  # (binaires Linux/musl propres au conteneur, sans écraser ceux de l'hôte).
  client:
    image: node:22-alpine
    container_name: braises-client-dev
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter @braises/client dev"
    volumes:
      #
      # LES SOURCES SONT MONTÉES EN LECTURE SEULE — et c'est LA garde définitive.
      #
      # Le conteneur tourne en root. Tant qu'il pouvait ÉCRIRE dans le dépôt monté,
      # tout ce qu'il y déposait appartenait à root sur l'hôte : `dist/` (un `vite
      # build` lancé dedans), `scratchpad/` (les captures du smoke), `.pnpm-store/`,
      # et les `node_modules` de chaque paquet. Résultat vécu : `pnpm install`,
      # `pnpm build` et `pnpm smoke` de l'HÔTE tous refusés (EACCES), et un
      # `sudo rm -rf` à repasser après chaque incursion dans le conteneur.
      #
      # Deux fausses pistes, essayées et écartées :
      #   · un volume nommé par dossier écrit — ça bouche les fuites CONNUES ; la
      #     prochaine commande qu'on lance dedans en ouvre une autre ;
      #   · faire tomber le processus principal sur l'uid de l'hôte (su-exec) — ça
      #     règle le serveur de dev, mais PAS `docker compose exec`, qui repart en
      #     root. Or c'est précisément par là que les fichiers root sont arrivés.
      #
      # `:ro` ferme la porte pour de bon : le conteneur ne PEUT PLUS écrire dans le
      # dépôt, quoi qu'on lance dedans et sous quelque identité que ce soit. Ce qu'il
      # a le droit d'écrire (les node_modules, le store pnpm) vit dans des volumes
      # nommés, montés par-dessus — un montage plus profond l'emporte sur `:ro`.
      #
      # Corollaire assumé : on ne BÂTIT plus dans le conteneur. Le build et le smoke
      # se lancent sur l'hôte (`pnpm build`, `pnpm smoke`) — ce qui est de toute façon
      # leur place : ils produisent des artefacts qu'on veut voir et versionner.
      - .:/app:ro
      # UN VOLUME PAR node_modules DU WORKSPACE — pas seulement celui de la racine.
      # pnpm en crée un par paquet (packages/*/node_modules) : sans ces montages,
      # ils tombaient dans le bind mount `.:/app` et le `pnpm install` du conteneur
      # les écrivait EN ROOT dans le dépôt de l'hôte, avec des binaires musl et des
      # liens vers /app/node_modules/.pnpm — un chemin qui n'existe pas sur l'hôte.
      # Conséquences vécues : `pnpm install` de l'hôte refusé (EACCES), et un Vite
      # qui résolvait ses modules à travers deux arbres contradictoires.
      - braises_node_modules:/app/node_modules
      - braises_client_modules:/app/packages/client/node_modules
      - braises_sim_modules:/app/packages/sim/node_modules
      - braises_server_modules:/app/packages/server/node_modules
      # LE STORE PNPM VIT HORS DU DÉPÔT — et c'est une correction, pas une préférence.
      #
      # Il était monté en `/app/.pnpm-store`, donc SOUS le bind `:ro`. Docker doit créer
      # le point de montage avant de poser le volume par-dessus : il lui fallait un
      # dossier `.pnpm-store/` DÉJÀ PRÉSENT dans le dépôt de l'hôte. Or ce dossier est
      # dans `.gitignore`. Conséquence vécue (2026-07-13) : le jour où il a disparu, le
      # conteneur a refusé de démarrer sur un « read-only file system » qui ne parlait
      # de rien — et un clone frais du dépôt ne démarrait pas non plus.
      #
      # Hors de `/app`, Docker crée le point de montage dans le rootfs du conteneur
      # (inscriptible) : plus aucune dépendance à un dossier ignoré par git. Les
      # hardlinks du store restent valides — les `node_modules` sont eux aussi des
      # volumes nommés, donc sur le MÊME device que celui-ci.
      - braises_pnpm_store:/pnpm-store
    environment:
      # pnpm lit les `npm_config_*` : c'est ce qui envoie le store dans le volume
      # ci-dessus sans toucher au `.npmrc` du dépôt (qui, lui, vaut aussi pour l'hôte).
      NPM_CONFIG_STORE_DIR: /pnpm-store
      # LE WATCHER SCRUTE — sans quoi le conteneur ne voit RIEN bouger.
      # Les événements inotify de l'hôte ne traversent pas le bind mount ci-dessus :
      # sans scrutin, Vite sert un graphe de modules figé au démarrage et le
      # rechargement auto promis en tête de ce fichier est un mensonge (vécu le
      # 2026-07-14 : un fichier SUPPRIMÉ sur l'hôte encore servi une heure durant).
      # Le détail est dans `packages/client/vite.config.ts`.
      BRAISES_POLL: "1"
    expose:
      - "3000"
    # Sain dès que Vite répond sur :3000. `start_period` couvre le premier
    # `pnpm install` (les échecs n'y comptent pas ; un succès marque sain aussitôt).
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 120s
    # Rejoint le réseau partagé du proxy Traefik (~/projects/proxy) : c'est par là
    # que le proxy atteint ce conteneur (route dans proxy/dynamic/ashes.yml).
    networks:
      - web
    restart: unless-stopped

  # Le serveur AUTORITATIF de la Phase LAN (@braises/server, Colyseus + tsx). Il fait
  # tourner /sim sur Node ; le client (navigateur) s'y branche par l'écran principal
  # (mode Multi) sur ws://localhost:2567. Même patron de volumes que `client` : sources
  # en `:ro`, node_modules en volumes nommés (voir la recette « AJOUTER UNE DÉPENDANCE »
  # en tête de fichier — le serveur en fait partie). Pas de Traefik : le WebSocket sort
  # en direct par le port publié, plus simple qu'une route.
  server:
    image: node:22-alpine
    container_name: braises-server-dev
    working_dir: /app/packages/server
    # On lance tsx DIRECTEMENT depuis le volume (pas de corepack ni pnpm install) :
    # les deps y sont déjà (recette « AJOUTER UNE DÉPENDANCE » en tête de fichier), et
    # corepack exige un accès réseau à npmjs.org qui n'est pas garanti (hors-ligne → crash).
    command: sh -c "exec ./node_modules/.bin/tsx src/index.ts"
    volumes:
      - .:/app:ro
      - braises_node_modules:/app/node_modules
      - braises_sim_modules:/app/packages/sim/node_modules
      - braises_server_modules:/app/packages/server/node_modules
      - braises_pnpm_store:/pnpm-store
    environment:
      NPM_CONFIG_STORE_DIR: /pnpm-store
    ports:
      # Publié sur l'hôte : le navigateur (sur l'hôte) atteint ws://localhost:2567.
      - "2567:2567"
    # Sain dès que le port accepte les connexions. Test TCP (node, sans effet de bord) :
    # Colyseus ne sert PAS `GET /` (404/pas de route), donc un `wget /` échouerait à tort.
    # `start_period` couvre la génération de la vallée (~10 s de CPU au démarrage).
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').connect(2567,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 40s
    restart: unless-stopped

volumes:
  braises_node_modules:
  braises_client_modules:
  braises_sim_modules:
  braises_server_modules:
  braises_pnpm_store:

# Réseau partagé du proxy Traefik (~/projects/proxy). Créé hors compose
# (`docker network create traefiknet`) ; `external: true` évite le préfixe projet.
# Seul `client` y est attaché ; `server` reste sur le réseau par défaut de la stack
# (le navigateur l'atteint en direct sur :2567, pas via Traefik).
networks:
  web:
    external: true
    name: traefiknet
