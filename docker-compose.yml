# Stack de développement : serveur Vite (client) derrière Traefik.
# Édite un fichier sous packages/client/src/ → recompilation à la volée + rechargement auto.
#
#   docker compose up   → http://ashes.localhost  (dashboard Traefik : http://localhost:8080)
#
# Provider « fichier » (et non le provider Docker) : évite le socket Docker et les
# soucis de négociation d'API avec Docker Engine 29+ (cf. convention du projet front).
services:
  traefik:
    image: traefik:v3.5
    container_name: braises-traefik-dev
    command:
      - "--entrypoints.web.address=:80"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--api.dashboard=true"
      - "--api.insecure=true"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./traefik/dynamic.dev.yml:/etc/traefik/dynamic/dynamic.yml:ro
    depends_on:
      - client
    restart: unless-stopped

  # Serveur de dev Vite. Le code source est monté en volume : les changements
  # sur l'hôte sont vus dans le conteneur. node_modules dans un volume nommé
  # (binaires Linux/musl propres au conteneur, sans écraser celui de l'hôte).
  client:
    image: node:22-alpine
    container_name: braises-client-dev
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter @braises/client dev"
    volumes:
      - .:/app
      - braises_node_modules:/app/node_modules
    expose:
      - "3000"
    restart: unless-stopped

volumes:
  braises_node_modules:
